<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KoboToolbox Multi-Page Form</title>
<style>
:root {
  --kobomedium: #2c3e50;
  --kobolight: #ecf0f1;
  --koboorange: #ef5a24;
  --koboblue: #3498db;
  --border-color: #bdc3c7;
  --text-color: #2c3e50;
  --bg-form: #f4f4f4;
  --paper-bg: #ffffff;
  --required-color: #c0392b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  background-color: var(--bg-form);
  color: var(--text-color);
  padding: 30px 15px;
  display: flex;
  justify-content: center;
}

.enketo-form-container {
  width: 100%;
  max-width: 800px;
  background: var(--paper-bg);
  border: 1px solid var(--border-color);
  border-top: 6px solid var(--koboorange);
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  border-radius: 2px;
  display: flex;
  flex-direction: column;
}

.form-header {
  padding: 25px 35px;
  border-bottom: 1px solid #e6e6e6;
}
.form-header h2 {
  font-size: 22px;
  font-weight: 500;
  color: var(--kobomedium);
}

.form-body {
  padding: 25px 35px;
  min-height: 350px;
}

/* Kobo Multi-Page Layer */
.kobo-page {
  display: none; /* Sembunyikan semua halaman secara default */
}
.kobo-page.active-page {
  display: block; /* Hanya tampilkan halaman aktif */
}

.group-title {
  font-size: 16px;
  font-weight: bold;
  text-transform: uppercase;
  color: #7f8c8d;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
  border-bottom: 2px solid var(--kobolight);
  padding-bottom: 8px;
}

.question {
  margin-bottom: 25px;
}
.question.hidden {
  display: none !important;
}

.question-label {
  display: block;
  font-size: 15px;
  font-weight: bold;
  margin-bottom: 8px;
  color: var(--kobomedium);
}
.question-label .required {
  color: var(--required-color);
  margin-left: 3px;
}

.form-control {
  width: 100%;
  padding: 10px 12px;
  font-size: 14px;
  border: 1px solid var(--border-color);
  border-radius: 2px;
  background-color: #fff;
}
.form-control:focus {
  outline: none;
  border-color: var(--koboblue);
}
textarea.form-control { resize: vertical; min-height: 80px; }

.option-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 5px;
}
.option-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
  font-size: 14px;
}
.option-item input[type="radio"] {
  margin-top: 3px;
  width: 16px;
  height: 16px;
}

.grid-row { display: flex; gap: 15px; }
.grid-col { flex: 1; }

/* Progress Indicator & Buttons Kobo Style */
.form-footer {
  background: #fcfcfc;
  padding: 20px 35px;
  border-top: 1px solid #e6e6e6;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

.btn {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 3px;
  cursor: pointer;
  border: 1px solid transparent;
  user-select: none;
}
.btn-next { background-color: var(--koboblue); color: white; }
.btn-next:hover { background-color: #2980b9; }
.btn-submit { background-color: var(--koboorange); color: white; display: none; }
.btn-submit:hover { background-color: #d34817; }
.btn-prev { background-color: #fff; border-color: var(--border-color); color: #7f8c8d; }
.btn-prev:hover { background-color: #eee; }
.btn-prev:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div class="enketo-form-container">
  <div class="form-header">
    <h2>Survey Pembangunan Keluarga</h2>
  </div>

  <form id="koboMultiPageForm" onsubmit="handleSubmit(event)">
    <div class="form-body">
      
      <div class="kobo-page active-page" id="page-1">
        <div class="group-title">I. Kependudukan & Wilayah (Halaman 1 / 2)</div>

        <div class="question">
          <label class="question-label" for="Kecamatan">Kecamatan<span class="required">*</span></label>
          <select name="Kecamatan" id="Kecamatan" class="form-control" required>
            <option value="">Select one</option>
            <option value="banjarmasin_timur">020. Banjarmasin Timur</option>
            <option value="banjarmasin_tengah">031. Banjarmasin Tengah</option>
            <option value="banjarmasin_selatan">010. Banjarmasin Selatan</option>
            <option value="banjarmasin_barat">030. Banjarmasin Barat</option>
            <option value="banjarmasin_utara">040. Banjarmasin Utara</option>
          </select>
        </div>

        <div class="question hidden" data-relevant="getFieldValue('Kecamatan') === 'banjarmasin_timur'">
          <label class="question-label" for="Kelurahan1">Kelurahan (Banjarmasin Timur)<span class="required">*</span></label>
          <select name="Kelurahan" id="Kelurahan1" class="form-control" data-required-if="getFieldValue('Kecamatan') === 'banjarmasin_timur'">
            <option value="">Select one</option>
            <option value="benua_anyar">Benua Anyar</option>
            <option value="kebun_bunga">Kebun Bunga</option>
          </select>
        </div>

        <div class="question hidden" data-relevant="getFieldValue('Kecamatan') === 'banjarmasin_tengah'">
          <label class="question-label" for="Kelurahan2">Kelurahan (Banjarmasin Tengah)<span class="required">*</span></label>
          <select name="Kelurahan" id="Kelurahan2" class="form-control" data-required-if="getFieldValue('Kecamatan') === 'banjarmasin_tengah'">
            <option value="">Select one</option>
            <option value="antasan_besar">Antasan Besar</option>
          </select>
        </div>

        <div class="grid-row">
          <div class="grid-col question">
            <label class="question-label" for="RT">RT<span class="required">*</span></label>
            <input type="number" name="RT" id="RT" class="form-control" required>
          </div>
          <div class="grid-col question">
            <label class="question-label" for="RW">RW<span class="required">*</span></label>
            <input type="number" name="RW" id="RW" class="form-control" required>
          </div>
        </div>

        <div class="question">
          <label class="question-label" for="Alamat">Alamat Rumah<span class="required">*</span></label>
          <textarea name="Alamat" id="Alamat" class="form-control" required></textarea>
        </div>
      </div>

      <div class="kobo-page" id="page-2">
        <div class="group-title">II. Kondisi Sanitasi & Lingkungan (Halaman 2 / 2)</div>

        <div class="question">
          <label class="question-label">Kepemilikan Fasilitas Tempat Buang Air Besar<span class="required">*</span></label>
          <div class="option-list">
            <label class="option-item"><input type="radio" name="FasilitasBAB" value="1__sendiri"> 1. Milik Sendiri</label>
            <label class="option-item"><input type="radio" name="FasilitasBAB" value="2__bersama"> 2. Milik Bersama / Komunal</label>
            <label class="option-item"><input type="radio" name="FasilitasBAB" value="0__tidak_ada"> 0. Tidak Ada Fasilitas</label>
          </div>
        </div>

        <div class="question hidden" data-relevant="getFieldValue('FasilitasBAB') !== '' && getFieldValue('FasilitasBAB') !== '0__tidak_ada'">
          <label class="question-label">Jenis Kloset yang Digunakan<span class="required">*</span></label>
          <div class="option-list">
            <label class="option-item"><input type="radio" name="JenisKloset" value="1__leher_angsa" data-required-if="getFieldValue('FasilitasBAB') !== '' && getFieldValue('FasilitasBAB') !== '0__tidak_ada'"> 1. Leher Angsa</label>
            <label class="option-item"><input type="radio" name="JenisKloset" value="2__plengsengan" data-required-if="getFieldValue('FasilitasBAB') !== '' && getFieldValue('FasilitasBAB') !== '0__tidak_ada'"> 2. Plengsengan dengan Tutup</label>
          </div>
        </div>

        <div class="question">
          <label class="question-label" for="PembuanganTinja">Tempat Pembuangan Akhir Tinja<span class="required">*</span></label>
          <select name="PembuanganTinja" id="PembuanganTinja" class="form-control" required>
            <option value="">Select one</option>
            <option value="tangki_septik">Tangki Septik (Sesuai Standar)</option>
            <option value="sungai_selokan">Sungai / Selokan / Kolam</option>
          </select>
        </div>
      </div>

    </div>

    <div class="form-footer">
      <button type="button" class="btn btn-prev" id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
      <div class="nav-buttons">
        <button type="button" class="btn btn-next" id="nextBtn" onclick="changePage(1)">Next</button>
        <button type="submit" class="btn btn-submit" id="submitBtn">Submit</button>
      </div>
    </div>
  </form>
</div>

<script>
let currentPageIdx = 0;
const pages = document.querySelectorAll('.kobo-page');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const submitBtn = document.getElementById('submitBtn');

// Fungsi Navigasi Halaman
function changePage(step) {
  // Jika menekan tombol 'Next', validasi dulu data di halaman saat ini
  if (step === 1 && !validateCurrentPage()) {
    alert('Mohon isi semua data yang wajib pada halaman ini sebelum melanjutkan.');
    return;
  }

  pages[currentPageIdx].classList.remove('active-page');
  currentPageIdx += step;
  pages[currentPageIdx].classList.add('active-page');

  // Update status tombol kontrol
  prevBtn.disabled = (currentPageIdx === 0);
  
  if (currentPageIdx === pages.length - 1) {
    nextBtn.style.display = 'none';
    submitBtn.style.display = 'block';
  } else {
    nextBtn.style.display = 'block';
    submitBtn.style.display = 'none';
  }
  
  window.scrollTo(0, 0);
}

// Hanya validasi field yang ada di halaman aktif saat ini
function validateCurrentPage() {
  const activePage = pages[currentPageIdx];
  const fields = activePage.querySelectorAll('input[required], select[required], textarea[required]');
  let isValid = true;
  
  fields.forEach(f => {
    // Abaikan validasi jika komponen induknya sedang tersembunyi (data-relevant tidak aktif)
    if (f.closest('.question.hidden')) return;

    if (f.type === 'radio') {
      const checked = activePage.querySelector(`input[name="${f.name}"]:checked`);
      if (!checked) isValid = false;
    } else {
      if (!f.value.trim()) isValid = false;
    }
  });
  return isValid;
}

// Fungsi Bantu Pengisian Data
function getFieldValue(name) {
  const radios = document.querySelectorAll(`input[type="radio"][name="${name}"]`);
  if (radios.length > 0) {
    let val = '';
    radios.forEach(r => { if (r.checked) val = r.value; });
    return val;
  }
  const el = document.querySelector(`select[name="${name}"], input[name="${name}"], textarea[name="${name}"]`);
  return el ? el.value : '';
}

function setFieldValue(name, value) {
  if (value === null || value === undefined) value = '';
  const strValue = String(value);

  const radios = document.querySelectorAll(`input[type="radio"][name="${name}"]`);
  if (radios.length > 0) {
    radios.forEach(r => {
      r.checked = (r.value === strValue || String(r.value).split('__')[0] === strValue);
    });
    return;
  }

  const select = document.querySelector(`select[name="${name}"]`);
  if (select) { select.value = strValue; return; }

  const input = document.querySelector(`input[name="${name}"], textarea[name="${name}"]`);
  if (input) input.value = strValue;
}

function evaluateAllRelevance() {
  document.querySelectorAll('[data-relevant]').forEach(container => {
    const expr = container.getAttribute('data-relevant');
    try {
      const isRelevant = new Function('getFieldValue', `return (${expr});`)(getFieldValue);
      if (isRelevant) {
        container.classList.remove('hidden');
      } else {
        container.classList.add('hidden');
        container.querySelectorAll('input, select, textarea').forEach(el => {
          if (el.type === 'radio') el.checked = false;
          else el.value = '';
        });
      }
    } catch (e) { console.error(e); }
  });

  document.querySelectorAll('[data-required-if]').forEach(el => {
    const expr = el.getAttribute('data-required-if');
    try {
      el.required = new Function('getFieldValue', `return (${expr});`)(getFieldValue);
    } catch (e) {}
  });
}

function attachChangeListeners() {
  document.querySelectorAll('input[name], select[name], textarea[name]').forEach(el => {
    el.addEventListener('change', evaluateAllRelevance);
    if (el.tagName === 'SELECT' || el.tagName === 'TEXTAREA' || el.type === 'text' || el.type === 'number') {
      el.addEventListener('input', evaluateAllRelevance);
    }
  });
}

function handleSubmit(event) {
  event.preventDefault();
  if (!validateCurrentPage()) {
    alert('Mohon isi seluruh field yang diperlukan.');
    return;
  }
  alert('Data Sukses Diperbarui!');
}

function prefillData(data) {
  Object.entries(data).forEach(([name, value]) => {
    setFieldValue(name, value);
  });
  evaluateAllRelevance();
}

document.addEventListener('DOMContentLoaded', function() {
  attachChangeListeners();
  evaluateAllRelevance();

  // === SIMULASI DATA EDIT DARI BACKEND ===
  const dataEdit = {
    "Kecamatan": "banjarmasin_timur",
    "Kelurahan": "kebun_bunga",
    "RT": "10",
    "RW": "2",
    "Alamat": "Jl. Kebun Bunga No. 12",
    "FasilitasBAB": "1__sendiri",
    "JenisKloset": "1__leher_angsa",
    "PembuanganTinja": "tangki_septik"
  };

  prefillData(dataEdit);
});
</script>
</body>
</html>
